<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>WAM Video Host — 3D Scene (Hybrid Optimized)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: sans-serif; }
    #renderCanvas { position: fixed; inset: 0; width: 100%; height: 100%; }
    #overlay { position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; background: #001; }
    #start-btn { padding: 20px 60px; font-size: 1.5rem; background: #3af; color: #fff; border: none; cursor: pointer; border-radius: 4px; }
    #ui-panel { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); padding: 10px; z-index: 10; display: none; }
    #wam-canvas { position: fixed; top: 0; left: 0; visibility: hidden; pointer-events: none; }
  </style>
</head>
<body>
  <!-- Canvas caché pour le rendu WAM -->
  <canvas id="wam-canvas" width="640" height="480"></canvas>
  <canvas id="renderCanvas"></canvas>

  <div id="overlay">
    <button id="start-btn">LANCER LE MOTEUR 3D</button>
  </div>
  <div id="ui-panel"><div id="instrument-container"></div></div>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script type="module">
    import VideoExtension from './js/extensions/VideoExtension.js';
    import { CanvasRenderer } from './js/extensions/videoExtensionHostSide.js';

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    let engine, scene, wamTexture, wamRenderer;

    async function initHost() {
      const {default: init} = await import('https://www.webaudiomodules.com/sdk/2.0.0-alpha.6/src/initializeWamHost.js');
      await init(audioContext, 'example');
      window.WAMExtensions = window.WAMExtensions || {};
      window.WAMExtensions.video = new VideoExtension();
    }

    function buildScene() {
      const canvas = document.getElementById('renderCanvas');
      engine = new BABYLON.Engine(canvas, true);
      scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0.05, 0.05, 0.1, 1);

      const camera = new BABYLON.ArcRotateCamera("cam", -Math.PI/2, 1.2, 7, BABYLON.Vector3.Zero(), scene);
      camera.attachControl(canvas, true);

      // OPTIMISATION : Utilisation de HtmlElementTexture sur le canvas WAM
      // C'est beaucoup plus rapide que DynamicTexture + drawImage
      const wamCanvas = document.getElementById('wam-canvas');
      wamTexture = new BABYLON.HtmlElementTexture("wamTex", wamCanvas, {
        engine: engine,
        generateMipMaps: false,
        samplingMode: BABYLON.Constants.TEXTURE_BILINEAR_SAMPLINGMODE
      });

      const mat = new BABYLON.StandardMaterial("mat", scene);
      mat.emissiveTexture = wamTexture;
      mat.disableLighting = true;

      // Affichage sur plusieurs objets
      const wall = BABYLON.MeshBuilder.CreatePlane("wall", {width: 8, height: 6}, scene);
      wall.material = mat;

      const sphere = BABYLON.MeshBuilder.CreateSphere("sphere", {diameter: 2}, scene);
      sphere.position.set(4, 0, 2);
      sphere.material = mat;

      const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 20, height: 20}, scene);
      ground.position.y = -3;
      ground.material = mat;

      window.addEventListener('resize', () => engine.resize());
    }

    async function run() {
      document.getElementById('overlay').style.display = 'none';
      if (audioContext.state === 'suspended') await audioContext.resume();

      // 1. Init WAM Host
      await initHost();

      // 2. Init Renderer WAM (WebGL pur)
      const wamCanvas = document.getElementById('wam-canvas');
      wamRenderer = new CanvasRenderer(wamCanvas);

      // 3. Init Babylon
      buildScene();

      // 4. Load Plugin
      const {default: WAM} = await import('https://www.webaudiomodules.com/community/plugins/burns-audio/video_butterchurn/index.js');
      const instance = new WAM('example', audioContext);
      await instance.initialize({});
      instance.audioNode.connect(audioContext.destination);

      const gui = await instance.createGui();
      document.getElementById('instrument-container').appendChild(gui);
      document.getElementById('ui-panel').style.display = 'block';

      const delegate = window.WAMExtensions.video.getDelegate(instance.instanceId);
      delegate.connectVideo({ width: 640, height: 480, gl: wamRenderer.gl });

      // Boucle de rendu
      scene.onBeforeRenderObservable.add(() => {
        const inputs = delegate.render([], audioContext.currentTime);
        if (inputs && inputs[0]) {
          // On dessine la texture du WAM dans le canvas caché via WebGL
          wamRenderer.render(inputs[0]);
          // On dit à Babylon de mettre à jour sa texture à partir du canvas
          // HtmlElementTexture gère cela de manière très optimisée
          wamTexture.update();
        }
      });

      engine.runRenderLoop(() => scene.render());
    }

    document.getElementById('start-btn').addEventListener('click', run);
  </script>
</body>
</html>
