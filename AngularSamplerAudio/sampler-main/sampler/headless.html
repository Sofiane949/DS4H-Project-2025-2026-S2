<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Sampler - Test Headless (sans GUI)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/shared/css/theme.css" />
  <style>
    .test-console {
      background: #0b1220;
      border: 1px solid #2a3444;
      border-radius: 10px;
      padding: 1rem;
      font-family: monospace;
      font-size: 0.9rem;
      max-height: 500px;
      overflow-y: auto;
    }
    .log-entry { margin: 0.25rem 0; }
    .log-entry.success { color: #4ade80; }
    .log-entry.error { color: #f87171; }
    .log-entry.info { color: #60a5fa; }
    .log-entry.warn { color: #fbbf24; }
    .controls { margin: 1rem 0; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .status {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 8px;
      font-weight: bold;
    }
    .status.running { background: #1e3a5f; color: #60a5fa; }
    .status.passed { background: #14532d; color: #4ade80; }
    .status.failed { background: #7f1d1d; color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sampler - Test Headless</h1>
    <p class="muted">
      Ce test vérifie que <code>SamplerEngine</code> fonctionne correctement <strong>sans interface graphique</strong>.
      Seul le moteur audio est testé ici, pas la GUI.
    </p>

    <div class="controls">
      <button id="runTests" class="btn primary">Lancer les tests</button>
      <button id="clearLogs" class="btn">Effacer les logs</button>
    </div>

    <div id="status" class="status running" style="display:none;">Tests en cours...</div>

    <h3>Console de test</h3>
    <div id="console" class="test-console">
      <div class="log-entry info">En attente du lancement des tests...</div>
    </div>
  </div>

  <script type="module" src="./js/headless-test.js"></script>
</body>
</html>
